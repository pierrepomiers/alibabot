<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alibabot — Validation</title>
  <link rel="icon" type="image/png" href="alibabot_logo.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0e1a;
      --bg-card: #131826;
      --bg-elevated: #1a2032;
      --border: #2a3142;
      --text: #e4e7ed;
      --text-muted: #8b95a7;
      --accent: #4a9eff;
      --accent-hover: #6db1ff;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
      --info: #60a5fa;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    button {
      font: inherit;
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover:not(:disabled) {
      background: var(--border);
      border-color: var(--accent);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0e1a;
      font-weight: 600;
    }
    button.primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    button.success {
      background: var(--success);
      border-color: var(--success);
      color: #0a0e1a;
      font-weight: 600;
    }
    button.danger {
      background: var(--danger);
      border-color: var(--danger);
      color: #0a0e1a;
      font-weight: 600;
    }

    input, select {
      font: inherit;
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      width: 100%;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Layout */
    .app-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }
    .app-shell.full-width {
      max-width: none;
      width: 100%;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .logo-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .app-logo {
      height: 128px;
      width: auto;
      display: block;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .card.active-snap {
      border-color: var(--success);
      background: linear-gradient(135deg, var(--bg-card), rgba(74, 222, 128, 0.04));
    }

    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-row .meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--text-muted);
      font-size: 13px;
    }
    .card-row .meta strong {
      color: var(--text);
      font-weight: 500;
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-pending { background: rgba(251, 191, 36, 0.18); color: var(--warning); }
    .badge-active { background: rgba(74, 222, 128, 0.18); color: var(--success); }
    .badge-rejected { background: rgba(248, 113, 113, 0.18); color: var(--danger); }
    .badge-archived { background: rgba(139, 149, 167, 0.2); color: var(--text-muted); }
    .badge-error { background: rgba(248, 113, 113, 0.2); color: var(--danger); }

    /* Login */
    .login-box {
      max-width: 380px;
      margin: 80px auto;
      padding: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .login-box h1 {
      margin: 0 0 20px;
      font-size: 22px;
    }
    .login-box label {
      display: block;
      margin: 12px 0 4px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .login-box button {
      width: 100%;
      margin-top: 18px;
    }

    /* Filter row */
    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* Diff sections */
    .diff-summary {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      padding: 14px 16px;
      background: var(--bg-elevated);
      border-radius: var(--radius);
      margin-bottom: 16px;
      font-size: 14px;
    }
    .diff-summary span { white-space: nowrap; }
    .diff-summary .added { color: var(--success); }
    .diff-summary .removed { color: var(--danger); }
    .diff-summary .price { color: var(--warning); }
    .diff-summary .stock { color: var(--info); }

    details.section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }
    details.section[open] { border-color: var(--accent); }
    details.section > summary {
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 600;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    details.section > summary::-webkit-details-marker { display: none; }
    details.section > summary::before {
      content: "▸";
      margin-right: 8px;
      transition: transform 0.15s;
      color: var(--text-muted);
    }
    details.section[open] > summary::before { transform: rotate(90deg); }
    details.section .section-body {
      padding: 0 16px 12px;
      max-height: 480px;
      overflow-y: auto;
    }

    .section-added > summary { color: var(--success); }
    .section-removed > summary { color: var(--danger); }
    .section-price > summary { color: var(--warning); }
    .section-stock > summary { color: var(--info); }

    /* Item rows */
    .item-row {
      display: grid;
      grid-template-columns: 90px 100px 1fr auto;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      align-items: center;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row .supp { color: var(--text-muted); font-size: 12px; }
    .item-row .brand-tag { color: var(--info); font-size: 12px; }
    .item-row .name { color: var(--text); }
    .item-row .price { font-weight: 600; text-align: right; white-space: nowrap; }
    .price-old { color: var(--text-muted); text-decoration: line-through; margin-right: 4px; }
    .delta-up { color: var(--danger); }
    .delta-down { color: var(--success); }

    /* Diff filters */
    .diff-section-filter {
      padding: 10px 16px 4px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    .diff-section-filter input,
    .diff-section-filter select {
      width: auto;
      min-width: 140px;
      padding: 5px 10px;
      font-size: 13px;
    }

    /* Toast / banner */
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-elevated);
      border: 1px solid var(--danger);
      color: var(--text);
      padding: 10px 38px 10px 14px;
      border-radius: var(--radius);
      z-index: 100;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
      max-width: 92vw;
    }
    .toast .close {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 4px 8px;
      font-size: 16px;
    }

    /* Spinner */
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 20px;
    }

    .actions-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
      padding: 16px 0;
      flex-wrap: wrap;
    }
    .actions-bar button { padding: 12px 24px; font-size: 16px; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-bottom: 12px;
    }
    .back-link:hover { color: var(--accent); background: none; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .tab {
      padding: 10px 18px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      font-size: 14px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover {
      color: var(--text);
      background: none;
      border-bottom-color: var(--border);
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Catalog layout */
    .catalog-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    .facets {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      position: sticky;
      top: 1rem;
      align-self: start;
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
    }
    .facets h3 {
      font-size: 0.78rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 1rem 0 0.5rem;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .facets h3:first-of-type { margin-top: 0; }
    .facet-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
      font-size: 13px;
    }
    .facet-item input {
      width: auto;
      margin: 0;
      cursor: pointer;
    }
    .facet-item .label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .facet-item .count {
      color: var(--text-muted);
      font-size: 12px;
    }
    .facets .price-range {
      display: flex;
      gap: 6px;
    }
    .facets .price-range input {
      padding: 6px 8px;
      font-size: 13px;
    }
    .facets .show-more {
      margin-top: 6px;
      background: none;
      border: none;
      color: var(--accent);
      padding: 0;
      font-size: 12px;
      cursor: pointer;
    }
    .facets .show-more:hover {
      color: var(--accent-hover);
      background: none;
      border: none;
    }
    .facets .reset {
      width: 100%;
      margin-top: 1rem;
    }

    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .search-bar .search-input { flex: 1 1 200px; }
    .search-bar .sort-select { width: auto; min-width: 180px; }

    .catalog-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .product-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s;
    }
    .product-card:hover { border-color: var(--accent); }
    .product-photo {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg-elevated);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-photo img {
      max-width: 92%;
      max-height: 92%;
      object-fit: contain;
    }
    .product-photo .no-img {
      color: var(--text-muted);
      font-size: 11px;
    }
    .product-photo .out-of-stock {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0, 0, 0, 0.7);
      color: var(--text);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    .product-brand {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .product-name {
      font-size: 13px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 34px;
    }
    .product-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-top: auto;
    }
    .product-price {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }
    .product-supplier {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--bg-elevated);
      color: var(--text-muted);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .product-link {
      font-size: 12px;
      color: var(--accent);
      padding-top: 2px;
    }
    .product-link:hover { text-decoration: underline; }

    #catalog-sentinel {
      padding: 1.5rem 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      grid-column: 1 / -1;
    }

    /* Variant badges on product cards */
    .variants-row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin: 0.4rem 0;
    }
    .color-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }
    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: inline-block;
      flex-shrink: 0;
      cursor: help;
    }
    .color-more {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 2px;
    }
    .size-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .size-pill {
      font-size: 11px;
      padding: 1px 6px;
      background: var(--bg-elevated);
      color: var(--text-muted);
      border-radius: 3px;
      border: 1px solid var(--border);
      white-space: nowrap;
      cursor: help;
    }
    .size-pill.size-more {
      background: transparent;
      border: none;
      cursor: default;
    }

    /* Color dot inside a sidebar facet item */
    .facet-color-dot {
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .catalog-layout { grid-template-columns: 1fr; }
      .facets {
        position: static;
        max-height: none;
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .item-row {
        grid-template-columns: 1fr;
        gap: 2px;
      }
      .item-row .price { text-align: left; }
    }
  </style>
</head>
<body>
  <div id="app"><div class="spinner"></div></div>

  <script>
    // IMPORTANT: remplacer <ANON_KEY_HERE> par la clé "anon public" du projet Supabase alibabot
    // (Dashboard Supabase → Settings → API → "anon public" key)
    const CONFIG = {
      supabaseUrl: "https://wmlxljwabqpiosvhmmmd.supabase.co",
      supabaseKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtbHhsandhYnFwaW9zdmhtbW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MjIyNjMsImV4cCI6MjA5MzM5ODI2M30.SoKaKb1QFap9IC9fwqrzxojqERzqIHEqnURdKTY5M1M",
      apiUrl: "https://alibabot.onrender.com",
      apiSecret: "alibabot2026",
    };

    // ─── Color mapping (canonical TitleCase from normalizers/values.py) ───
    const COLOR_HEX = {
      "Black": "#0f0f0f",
      "White": "#ffffff",
      "Grey": "#7a7a7a",
      "Gray": "#7a7a7a",
      "Silver": "#c0c0c0",
      "Gold": "#d4af37",
      "Blue": "#1e7fc8",
      "Red": "#d63131",
      "Green": "#3aa647",
      "Yellow": "#f5d520",
      "Orange": "#f08a1c",
      "Purple": "#7a4fb8",
      "Pink": "#e873a0",
      "Brown": "#7a4f2d",
      "Cherry": "#a8262f",
      "Burgundy": "#6e1b27",
      "Mint": "#9be3c4",
      "Mustard": "#d4a020",
      "Avocado": "#7a8c3f",
      "Acid Lemon": "#d8e826",
      "Acid": "#d8e826",
      "Granite": "#5a5d62",
      "Coral": "#e8806a",
      "Olive": "#6b7340",
      "Navy": "#1c2845",
      "Teal": "#2d8589",
      "Khaki": "#bda56b",
      "Beige": "#d8c8a4",
      "Sand": "#d4c294",
      "Sage": "#a8b89a",
      "Smoke": "#5e636b",
      "Clear": "#e8e8e8",
      "Cream": "#f0e8d4",
      "Tranquil Blue": "#7eb6d4",
      "Steel Grey": "#5e6878",
      "Warm Grey": "#9e8e7e",
      "Mango": "#f0a830",
      "Alpine": "#bcd2e0",
      "Pacific Blue": "#2a6b9e",
      "Light Blue": "#b8d4e8",
      "Dark Blue": "#1a3458",
      "Rainbow": "linear-gradient(90deg, #ff0000, #ff8800, #ffee00, #00cc00, #0088ff, #8800cc)",
      "Fluo": "#cdfa1d",
      "Neon": "#cdfa1d",
    };

    function getColorStyle(colorName) {
      if (!colorName) return { background: "#999" };
      // Composed color names ("Black / Grey", "Black White") → take the first token
      const firstColor = colorName.split(/[\/&]/)[0].trim();
      const hex = COLOR_HEX[colorName] || COLOR_HEX[firstColor];
      if (!hex) return { background: "#999" };
      if (hex.startsWith("linear-gradient")) return { background: hex };
      return { background: hex };
    }

    // ─── State ───────────────────────────────────────────────────────
    const S = {
      view: "loading",       // "loading" | "login" | "snapshots" | "diff" | "catalog"
      user: null,
      snapshots: [],
      filterPendingOnly: false,
      currentDiff: null,
      currentSnapshotId: null,
      diffFilters: { added: { supplier: "", q: "" }, removed: { supplier: "", q: "" }, price: { supplier: "", q: "" }, stock: { supplier: "", q: "" } },
      catalog: {
        items: [],
        total: 0,
        offset: 0,
        hasMore: true,
        loading: false,
        facets: null,
        showAllBrands: false,
        showAllColors: false,
        showAllSizes: false,
        filters: {
          supplier: null,
          category: null,
          brand: null,
          in_stock: null,
          q: "",
          min_price: null,
          max_price: null,
          color: null,
          size: null,
        },
        sort: "name",
        direction: "asc",
        searchTimer: null,
      },
      loading: false,
      error: null,
    };

    let sb;

    // ─── API helper ──────────────────────────────────────────────────
    async function apiCall(path, opts = {}) {
      const headers = {
        "x-api-secret": CONFIG.apiSecret,
        "Content-Type": "application/json",
        ...(opts.headers || {}),
      };
      if (sb) {
        const { data: { session } } = await sb.auth.getSession();
        if (session?.access_token) headers["Authorization"] = `Bearer ${session.access_token}`;
      }
      const res = await fetch(CONFIG.apiUrl + path, { ...opts, headers });
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { const j = await res.json(); msg = j.detail || j.message || msg; } catch (_) {}
        throw new Error(msg);
      }
      return res.json();
    }

    // ─── Auth ────────────────────────────────────────────────────────
    async function login(email, password) {
      S.loading = true; S.error = null; render();
      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        S.user = data.user;
        await fetchSnapshots();
        S.view = "snapshots";
      } catch (e) {
        S.error = e.message || "Login failed";
      } finally {
        S.loading = false; render();
      }
    }

    async function logout() {
      await sb.auth.signOut();
      S.user = null;
      S.snapshots = [];
      S.currentDiff = null;
      S.view = "login";
      render();
    }

    // ─── Snapshots ──────────────────────────────────────────────────
    async function fetchSnapshots() {
      const data = await apiCall("/snapshots?limit=50");
      S.snapshots = Array.isArray(data) ? data : [];
    }

    async function refreshSnapshots() {
      S.loading = true; S.error = null; render();
      try { await fetchSnapshots(); }
      catch (e) { S.error = e.message; }
      finally { S.loading = false; render(); }
    }

    async function fetchDiff(snapshotId) {
      S.loading = true; S.error = null; S.currentSnapshotId = snapshotId; S.view = "diff"; render();
      try {
        S.currentDiff = await apiCall(`/snapshots/${encodeURIComponent(snapshotId)}/diff?detail=full`);
      } catch (e) {
        S.error = e.message;
        S.currentDiff = null;
      } finally {
        S.loading = false; render();
      }
    }

    async function acceptSnapshot(snapshotId) {
      if (!confirm(`Accepter le snapshot ${snapshotId} ? Il deviendra l'actif.`)) return;
      S.loading = true; S.error = null; render();
      try {
        const email = S.user?.email || "frontend";
        await apiCall(`/snapshots/${encodeURIComponent(snapshotId)}/accept?activated_by=${encodeURIComponent(email)}`, { method: "POST" });
        await fetchSnapshots();
        S.view = "snapshots";
        S.currentDiff = null;
      } catch (e) {
        S.error = e.message;
      } finally {
        S.loading = false; render();
      }
    }

    async function restoreSnapshot(snapshotId) {
      if (!confirm("Réactiver ce snapshot comme catalogue actif ? L'actuel actif sera archivé.")) return;
      S.loading = true; S.error = null; render();
      try {
        const email = S.user?.email || "frontend";
        await apiCall(`/snapshots/${encodeURIComponent(snapshotId)}/restore?activated_by=${encodeURIComponent(email)}`, { method: "POST" });
        await fetchSnapshots();
      } catch (e) {
        S.error = `Erreur lors de la restauration : ${e.message}`;
      } finally {
        S.loading = false; render();
      }
    }

    async function rejectSnapshot(snapshotId) {
      const reason = prompt(`Raison du rejet du snapshot ${snapshotId} ?`, "");
      if (reason === null) return;
      S.loading = true; S.error = null; render();
      try {
        const qs = reason ? `?reason=${encodeURIComponent(reason)}` : "";
        await apiCall(`/snapshots/${encodeURIComponent(snapshotId)}/reject${qs}`, { method: "POST" });
        await fetchSnapshots();
        S.view = "snapshots";
        S.currentDiff = null;
      } catch (e) {
        S.error = e.message;
      } finally {
        S.loading = false; render();
      }
    }

    // ─── Helpers ────────────────────────────────────────────────────
    function escapeHtml(s) {
      if (s == null) return "";
      return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function relativeTime(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      const diff = (Date.now() - d.getTime()) / 1000;
      if (diff < 60) return "à l'instant";
      if (diff < 3600) return `il y a ${Math.floor(diff / 60)} min`;
      if (diff < 86400) return `il y a ${Math.floor(diff / 3600)} h`;
      if (diff < 86400 * 30) return `il y a ${Math.floor(diff / 86400)} j`;
      return d.toLocaleDateString("fr-FR");
    }

    function fmtPrice(p) {
      if (p == null || p === "") return "—";
      const n = typeof p === "number" ? p : parseFloat(p);
      if (Number.isNaN(n)) return String(p);
      return n.toLocaleString("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
    }

    function uniqueSuppliers(items) {
      const set = new Set();
      for (const it of items || []) if (it.supplier) set.add(it.supplier);
      return [...set].sort();
    }

    function applyItemFilter(items, f) {
      if (!items) return [];
      const q = (f.q || "").toLowerCase();
      return items.filter((it) => {
        if (f.supplier && it.supplier !== f.supplier) return false;
        if (q && !(`${it.name || ""} ${it.brand || ""}`).toLowerCase().includes(q)) return false;
        return true;
      });
    }

    // ─── Catalog ────────────────────────────────────────────────────
    async function fetchCatalog(reset = false) {
      const c = S.catalog;
      if (c.loading) return;
      if (reset) {
        c.items = [];
        c.offset = 0;
        c.hasMore = true;
      }
      if (!c.hasMore) return;

      c.loading = true;
      render();

      const params = new URLSearchParams();
      Object.entries(c.filters).forEach(([k, v]) => {
        if (v !== null && v !== "") params.set(k, v);
      });
      params.set("sort", c.sort);
      params.set("direction", c.direction);
      params.set("limit", "50");
      params.set("offset", String(c.offset));

      try {
        const data = await apiCall(`/catalog/active?${params}`);
        c.items.push(...(data.items || []));
        c.total = data.total || 0;
        c.offset = c.items.length;
        c.hasMore = c.items.length < c.total;
      } catch (e) {
        S.error = e.message;
      } finally {
        c.loading = false;
        render();
      }
    }

    async function fetchFacets() {
      try {
        const data = await apiCall(`/catalog/active/facets`);
        S.catalog.facets = data;
        render();
      } catch (e) {
        S.error = e.message;
        render();
      }
    }

    function resetCatalogFilters() {
      S.catalog.filters = {
        supplier: null, category: null, brand: null, in_stock: null,
        q: "", min_price: null, max_price: null,
        color: null, size: null,
      };
      S.catalog.sort = "name";
      S.catalog.direction = "asc";
      fetchCatalog(true);
    }

    async function switchTab(view) {
      if (view === "catalog") {
        S.view = "catalog";
        render();
        if (!S.catalog.facets) fetchFacets();
        if (S.catalog.items.length === 0 && S.catalog.hasMore) fetchCatalog(true);
      } else {
        S.view = "snapshots";
        S.currentDiff = null;
        render();
      }
    }

    // ─── Render ──────────────────────────────────────────────────────
    function render() {
      const root = document.getElementById("app");
      let html = "";

      if (S.error) {
        html += `<div class="toast">${escapeHtml(S.error)}<button class="close" onclick="dismissError()">×</button></div>`;
      }

      if (S.view === "loading") {
        html += `<div class="spinner"></div>`;
      } else if (S.view === "login") {
        html += renderLogin();
      } else {
        let inner;
        if (S.view === "catalog") inner = renderCatalog();
        else if (S.view === "diff") inner = renderDiff();
        else inner = renderSnapshots();
        html += renderShell(inner);
      }

      root.innerHTML = html;
      attachHandlers();
      if (S.view === "catalog") setupInfiniteScroll();
    }

    function dismissError() { S.error = null; render(); }

    function renderShell(inner) {
      const userLabel = S.user?.email ? escapeHtml(S.user.email) : "";
      const validationActive = S.view === "snapshots" || S.view === "diff";
      const catalogActive = S.view === "catalog";
      const fullWidth = S.view === "catalog" ? " full-width" : "";
      return `
        <div class="app-shell${fullWidth}">
          <header class="app-header">
            <a href="#" class="logo-link" data-action="home">
              <img src="alibabot_logo.png" alt="Alibabot" class="app-logo" onerror="this.style.visibility='hidden'">
            </a>
            <div class="header-right">
              ${userLabel ? `<span class="user-email">${userLabel}</span>` : ""}
              <button id="btn-logout">Déconnexion</button>
            </div>
          </header>
          <nav class="tabs">
            <button class="tab ${validationActive ? "active" : ""}" data-tab="snapshots">Validation</button>
            <button class="tab ${catalogActive ? "active" : ""}" data-tab="catalog">Catalogue</button>
          </nav>
          ${inner}
        </div>
      `;
    }

    function renderLogin() {
      return `
        <div class="app-shell">
          <div class="login-box">
            <h1>Alibabot</h1>
            <form id="login-form">
              <label for="email">Email</label>
              <input type="email" id="email" autocomplete="username" required>
              <label for="password">Mot de passe</label>
              <input type="password" id="password" autocomplete="current-password" required>
              <button type="submit" class="primary" ${S.loading ? "disabled" : ""}>
                ${S.loading ? "Connexion…" : "Se connecter"}
              </button>
            </form>
          </div>
        </div>
      `;
    }

    function renderSnapshots() {
      if (S.loading && !S.snapshots.length) return `<div class="spinner"></div>`;

      const active = S.snapshots.find((s) => s.status === "active");
      const others = S.snapshots.filter((s) => s !== active);
      const list = S.filterPendingOnly ? others.filter((s) => s.status === "pending") : others;

      const filterBtn = `
        <button id="btn-toggle-filter">
          ${S.filterPendingOnly ? "✓ Pending only" : "Filter: pending only"}
        </button>
        <button id="btn-refresh">↻ Rafraîchir</button>
      `;

      let html = `<div class="filter-row">${filterBtn}</div>`;

      if (active) {
        html += `<div class="card active-snap" data-section="active">
          <div class="card-row">
            <div>
              <div><strong>Active</strong> — ${escapeHtml(active.snapshot_id)}</div>
              <div class="meta">
                <span><strong>${active.item_count}</strong> items</span>
                <span>activé ${relativeTime(active.activated_at)}</span>
                ${active.activated_by ? `<span>par ${escapeHtml(active.activated_by)}</span>` : ""}
              </div>
            </div>
            <span class="badge badge-active">active</span>
          </div>
        </div>`;
      }

      if (!list.length) {
        html += `<div class="empty">Aucun snapshot ${S.filterPendingOnly ? "pending" : ""}.</div>`;
        return html;
      }

      for (const snap of list) {
        const errBadge = snap.error_count > 0
          ? `<span class="badge badge-error">${snap.error_count} err</span>`
          : "";
        const canDiff = snap.status === "pending";
        const canRestore = snap.status === "archived";
        html += `
          <div class="card">
            <div class="card-row">
              <div>
                <div><strong>${escapeHtml(snap.snapshot_id)}</strong></div>
                <div class="meta">
                  <span>via <strong>${escapeHtml(snap.triggered_by)}</strong></span>
                  <span>${relativeTime(snap.created_at)}</span>
                  <span><strong>${snap.item_count}</strong> items</span>
                  ${errBadge}
                </div>
              </div>
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <span class="badge badge-${escapeHtml(snap.status)}">${escapeHtml(snap.status)}</span>
                ${canDiff ? `<button class="primary" data-diff="${escapeHtml(snap.snapshot_id)}">Voir le diff</button>` : ""}
                ${canRestore ? `<button data-restore="${escapeHtml(snap.snapshot_id)}">🔄 Restaurer</button>` : ""}
              </div>
            </div>
          </div>
        `;
      }
      return html;
    }

    function renderDiff() {
      if (S.loading || !S.currentDiff) return `<button class="back-link" id="btn-back">← Retour à la liste</button><div class="spinner"></div>`;

      const d = S.currentDiff;
      const sum = d.summary || {};

      let html = `<button class="back-link" id="btn-back">← Retour à la liste</button>`;
      html += `<div class="card">
        <div class="card-row">
          <div>
            <div><strong>Snapshot examiné</strong> — ${escapeHtml(d.snapshot_id)} <span class="badge badge-pending">pending</span></div>
            <div class="meta">
              <span>Comparé à : <strong>${d.active_snapshot_id ? escapeHtml(d.active_snapshot_id) : "(aucun actif)"}</strong></span>
            </div>
          </div>
        </div>
      </div>`;

      html += `<div class="diff-summary">
        <span class="added">+${sum.added || 0} ajouts</span>
        <span class="removed">−${sum.removed || 0} retraits</span>
        <span class="price">⚡ ${sum.price_changed || 0} prix changés</span>
        <span class="stock">📦 ${sum.stock_changed || 0} stock changé</span>
      </div>`;

      html += renderDiffSection("added", "Ajoutés", d.added, "section-added");
      html += renderDiffSection("removed", "Retirés", d.removed, "section-removed");
      html += renderDiffSection("price", "Prix changés", d.price_changed, "section-price", "price");
      html += renderDiffSection("stock", "Stock changé", d.stock_changed, "section-stock", "stock");

      html += `<div class="actions-bar">
        <button class="success" data-accept="${escapeHtml(d.snapshot_id)}">🟢 Accepter ce snapshot</button>
        <button class="danger" data-reject="${escapeHtml(d.snapshot_id)}">🔴 Rejeter</button>
      </div>`;

      return html;
    }

    function renderDiffSection(key, label, items, cls, kind = "default") {
      items = items || [];
      const filter = S.diffFilters[key];
      const suppliers = uniqueSuppliers(items);
      const filtered = applyItemFilter(items, filter);

      if (kind === "price") {
        filtered.sort((a, b) => Math.abs(b.delta_pct || 0) - Math.abs(a.delta_pct || 0));
      }

      const supplierOptions = suppliers.map((s) =>
        `<option value="${escapeHtml(s)}" ${filter.supplier === s ? "selected" : ""}>${escapeHtml(s)}</option>`
      ).join("");

      let body;
      if (!items.length) {
        body = `<div class="empty">Aucun item.</div>`;
      } else if (!filtered.length) {
        body = `<div class="empty">Aucun item ne correspond aux filtres.</div>`;
      } else {
        body = filtered.map((it) => renderItemRow(it, kind)).join("");
      }

      return `
        <details class="section ${cls}" ${items.length && (key === "added" || key === "price") ? "open" : ""}>
          <summary>${label} (${items.length})</summary>
          <div class="diff-section-filter">
            <select data-filter-section="${key}" data-filter-field="supplier">
              <option value="">Tous fournisseurs</option>
              ${supplierOptions}
            </select>
            <input type="text" placeholder="Recherche nom/marque…" value="${escapeHtml(filter.q)}"
              data-filter-section="${key}" data-filter-field="q">
          </div>
          <div class="section-body">${body}</div>
        </details>
      `;
    }

    function renderItemRow(it, kind) {
      const supp = `<span class="supp">${escapeHtml(it.supplier || "")}</span>`;
      const brand = `<span class="brand-tag">${escapeHtml(it.brand || "—")}</span>`;
      const name = `<span class="name">${escapeHtml(it.name || "")}</span>`;

      let trailing;
      if (kind === "price") {
        const delta = it.delta_pct;
        const cls = delta != null && delta >= 0 ? "delta-up" : "delta-down";
        const deltaStr = delta != null ? `${delta >= 0 ? "+" : ""}${delta.toFixed(1)}%` : "";
        trailing = `<span class="price"><span class="price-old">${fmtPrice(it.old_price)}</span>${fmtPrice(it.new_price)} <span class="${cls}">${deltaStr}</span></span>`;
      } else if (kind === "stock") {
        const oldS = it.old_in_stock ? "✓ stock" : "✗ rupture";
        const newS = it.new_in_stock ? "✓ stock" : "✗ rupture";
        trailing = `<span class="price">${oldS} → ${newS}</span>`;
      } else {
        trailing = `<span class="price">${fmtPrice(it.price_eur)}</span>`;
      }

      return `<div class="item-row">${supp}${brand}${name}${trailing}</div>`;
    }

    // ─── Catalog rendering ──────────────────────────────────────────
    function renderCatalog() {
      const c = S.catalog;
      return `
        <div class="catalog-layout">
          ${renderFacets()}
          <div>
            ${renderCatalogToolbar()}
            ${renderCatalogMeta()}
            ${renderProductGrid()}
            <div id="catalog-sentinel">${
              c.loading ? "Chargement…" : (c.hasMore ? "" : (c.items.length ? "Fin de la liste." : ""))
            }</div>
          </div>
        </div>
      `;
    }

    function renderFacets() {
      const c = S.catalog;
      const f = c.filters;
      const facets = c.facets;

      if (!facets) return `<aside class="facets"><div class="spinner" style="margin:20px auto;"></div></aside>`;

      const supplierBlock = renderFacetGroup("Fournisseur", "supplier", facets.suppliers, f.supplier, false);
      const categoryBlock = renderFacetGroup("Catégorie", "category", facets.categories, f.category, false);
      const brandBlock = renderFacetGroup("Marque", "brand", facets.brands, f.brand, true, 10);
      const colorBlock = renderColorFacetGroup(facets.colors || [], f.color);
      const sizeBlock = renderFacetGroup("Tailles", "size", facets.sizes || [], f.size, true, 8);

      return `
        <aside class="facets">
          ${supplierBlock}
          ${categoryBlock}
          ${brandBlock}
          ${colorBlock}
          ${sizeBlock}

          <h3>Prix (€)</h3>
          <div class="price-range">
            <input type="number" min="0" step="1" placeholder="Min" id="price-min" value="${f.min_price ?? ""}">
            <input type="number" min="0" step="1" placeholder="Max" id="price-max" value="${f.max_price ?? ""}">
          </div>

          <h3>Stock</h3>
          <label class="facet-item">
            <input type="checkbox" id="cb-instock" ${f.in_stock === true ? "checked" : ""}>
            <span class="label">En stock uniquement</span>
          </label>

          <button class="reset" id="btn-reset-filters">Réinitialiser les filtres</button>
        </aside>
      `;
    }

    function _showAllStateKey(key) {
      // brand → showAllBrands, color → showAllColors, size → showAllSizes
      return "showAll" + key.charAt(0).toUpperCase() + key.slice(1) + "s";
    }

    function renderFacetGroup(title, key, options, currentValue, withShowAll, limit = 10) {
      options = options || [];
      if (options.length === 0) return "";
      const stateKey = _showAllStateKey(key);
      const showAll = withShowAll && !!S.catalog[stateKey];
      const visible = withShowAll && !showAll ? options.slice(0, limit) : options;
      const items = visible.map((o) => `
        <label class="facet-item">
          <input type="radio" name="facet-${escapeHtml(key)}" data-facet="${escapeHtml(key)}" value="${escapeHtml(o.value)}" ${currentValue === o.value ? "checked" : ""}>
          <span class="label">${escapeHtml(o.value)}</span>
          <span class="count">${o.count}</span>
        </label>
      `).join("");

      const allItem = `
        <label class="facet-item">
          <input type="radio" name="facet-${escapeHtml(key)}" data-facet="${escapeHtml(key)}" value="" ${currentValue == null ? "checked" : ""}>
          <span class="label">Tous</span>
        </label>
      `;

      const showMoreBtn = withShowAll && options.length > limit
        ? `<button class="show-more" data-toggle-facet="${escapeHtml(key)}">${showAll ? "Voir moins" : `Voir toutes (${options.length})`}</button>`
        : "";

      return `<h3>${title}</h3>${allItem}${items}${showMoreBtn}`;
    }

    function renderColorFacetGroup(options, currentValue) {
      if (!options || options.length === 0) return "";
      const limit = 8;
      const stateKey = _showAllStateKey("color");
      const showAll = !!S.catalog[stateKey];
      const visible = showAll ? options : options.slice(0, limit);

      const allItem = `
        <label class="facet-item">
          <input type="radio" name="facet-color" data-facet="color" value="" ${currentValue == null ? "checked" : ""}>
          <span class="label">Tous</span>
        </label>
      `;

      const items = visible.map((o) => {
        const style = getColorStyle(o.value);
        const styleStr = Object.entries(style).map(([k, v]) => `${k}:${v}`).join(";");
        return `
          <label class="facet-item">
            <input type="radio" name="facet-color" data-facet="color" value="${escapeHtml(o.value)}" ${currentValue === o.value ? "checked" : ""}>
            <span class="color-dot facet-color-dot" style="${styleStr}"></span>
            <span class="label">${escapeHtml(o.value)}</span>
            <span class="count">${o.count}</span>
          </label>
        `;
      }).join("");

      const showMoreBtn = options.length > limit
        ? `<button class="show-more" data-toggle-facet="color">${showAll ? "Voir moins" : `Voir toutes (${options.length})`}</button>`
        : "";

      return `<h3>Couleurs</h3>${allItem}${items}${showMoreBtn}`;
    }

    function renderCatalogToolbar() {
      const c = S.catalog;
      const sortKey = `${c.sort}-${c.direction}`;
      const opt = (val, label) => `<option value="${val}" ${sortKey === val ? "selected" : ""}>${label}</option>`;
      return `
        <div class="search-bar">
          <input type="search" class="search-input" id="catalog-search" placeholder="Rechercher un produit…" value="${escapeHtml(c.filters.q || "")}">
          <select class="sort-select" id="catalog-sort">
            ${opt("name-asc", "Nom A→Z")}
            ${opt("name-desc", "Nom Z→A")}
            ${opt("price-asc", "Prix ↑")}
            ${opt("price-desc", "Prix ↓")}
            ${opt("brand-asc", "Marque A→Z")}
            ${opt("recent-desc", "Plus récent")}
          </select>
        </div>
      `;
    }

    function renderCatalogMeta() {
      const c = S.catalog;
      if (!c.items.length && c.loading) return "";
      const snap = c.facets?.snapshot_id ? `Snapshot actif : ${escapeHtml(c.facets.snapshot_id)}` : "";
      return `<div class="catalog-meta">
        <span>${c.items.length} / ${c.total} affichés</span>
        <span>${snap}</span>
      </div>`;
    }

    function renderProductGrid() {
      const c = S.catalog;
      if (!c.items.length) {
        if (c.loading) return `<div class="spinner"></div>`;
        return `<div class="empty">Aucun produit ne correspond aux filtres.</div>`;
      }
      return `<div class="product-grid">${c.items.map(renderProductCard).join("")}</div>`;
    }

    function getDisplayVariants(item) {
      // Returns {colors, sizes} from inferred_options + available variants only.
      const colors = new Set();
      const sizes = new Set();

      const inf = item.inferred_options || {};
      if (inf.color) colors.add(inf.color);
      if (inf.size) sizes.add(inf.size);

      for (const v of (item.variants || [])) {
        if (!v.available) continue;
        const opts = v.normalized_options || {};
        if (opts.color) colors.add(opts.color);
        if (opts.size) sizes.add(opts.size);
      }
      return { colors: Array.from(colors), sizes: Array.from(sizes) };
    }

    function renderVariantsBadges(item) {
      const { colors, sizes } = getDisplayVariants(item);
      if (colors.length === 0 && sizes.length === 0) return "";

      const colorPills = colors.slice(0, 6).map((c) => {
        const style = getColorStyle(c);
        const styleStr = Object.entries(style).map(([k, v]) => `${k}:${v}`).join(";");
        return `<span class="color-dot" style="${styleStr}" title="${escapeHtml(c)}"></span>`;
      }).join("");
      const colorOverflow = colors.length > 6 ? `<span class="color-more">+${colors.length - 6}</span>` : "";

      const sizePills = sizes.slice(0, 8).map((s) =>
        `<span class="size-pill" title="Taille ${escapeHtml(s)}">${escapeHtml(s)}</span>`
      ).join("");
      const sizeOverflow = sizes.length > 8 ? `<span class="size-pill size-more">+${sizes.length - 8}</span>` : "";

      return `
        <div class="variants-row">
          ${colors.length > 0 ? `<div class="color-row">${colorPills}${colorOverflow}</div>` : ""}
          ${sizes.length > 0 ? `<div class="size-row">${sizePills}${sizeOverflow}</div>` : ""}
        </div>
      `;
    }

    function renderProductCard(it) {
      const img = it.image_url
        ? `<img src="${escapeHtml(it.image_url)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<span class=\\'no-img\\'>Pas de photo</span>'">`
        : `<span class="no-img">Pas de photo</span>`;
      const oos = !it.in_stock ? `<span class="out-of-stock">Rupture</span>` : "";
      const price = it.price_eur != null ? fmtPrice(it.price_eur) : (it.price_min_eur ? `dès ${fmtPrice(it.price_min_eur)}` : "—");
      const link = it.product_url
        ? `<a class="product-link" href="${escapeHtml(it.product_url)}" target="_blank" rel="noopener">🔗 Voir produit</a>`
        : "";
      return `
        <div class="product-card">
          <div class="product-photo">${img}${oos}</div>
          <div class="product-brand">${escapeHtml(it.brand || "—")}</div>
          <div class="product-name" title="${escapeHtml(it.name || "")}">${escapeHtml(it.name || "")}</div>
          ${renderVariantsBadges(it)}
          <div class="product-bottom">
            <span class="product-price">${price}</span>
            <span class="product-supplier">${escapeHtml(it.supplier || "")}</span>
          </div>
          ${link}
        </div>
      `;
    }

    // Infinite scroll
    let _catalogObserver = null;
    function setupInfiniteScroll() {
      const sentinel = document.getElementById("catalog-sentinel");
      if (!sentinel) return;
      if (_catalogObserver) _catalogObserver.disconnect();
      _catalogObserver = new IntersectionObserver(
        (entries) => {
          if (entries[0].isIntersecting && S.catalog.hasMore && !S.catalog.loading) {
            fetchCatalog(false);
          }
        },
        { rootMargin: "200px" }
      );
      _catalogObserver.observe(sentinel);
    }

    // ─── Event handlers ─────────────────────────────────────────────
    function attachHandlers() {
      const loginForm = document.getElementById("login-form");
      if (loginForm) {
        loginForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          login(email, password);
        });
      }

      document.getElementById("btn-logout")?.addEventListener("click", logout);
      document.getElementById("btn-toggle-filter")?.addEventListener("click", () => {
        S.filterPendingOnly = !S.filterPendingOnly; render();
      });
      document.getElementById("btn-refresh")?.addEventListener("click", refreshSnapshots);
      document.getElementById("btn-back")?.addEventListener("click", () => {
        S.view = "snapshots"; S.currentDiff = null; render();
      });

      document.querySelectorAll("[data-diff]").forEach((b) => {
        b.addEventListener("click", () => fetchDiff(b.dataset.diff));
      });
      document.querySelectorAll("[data-accept]").forEach((b) => {
        b.addEventListener("click", () => acceptSnapshot(b.dataset.accept));
      });
      document.querySelectorAll("[data-reject]").forEach((b) => {
        b.addEventListener("click", () => rejectSnapshot(b.dataset.reject));
      });
      document.querySelectorAll("[data-restore]").forEach((b) => {
        b.addEventListener("click", () => restoreSnapshot(b.dataset.restore));
      });

      document.querySelectorAll("[data-filter-section]").forEach((el) => {
        const evt = el.tagName === "SELECT" ? "change" : "input";
        el.addEventListener(evt, (e) => {
          const section = el.dataset.filterSection;
          const field = el.dataset.filterField;
          S.diffFilters[section][field] = e.target.value;
          // Re-render only diff sections, but full re-render is fine and simpler.
          // Keep section <details> open state by saving currently-open sections.
          const openKeys = [...document.querySelectorAll("details.section[open]")].map((d) => d.querySelector("summary").textContent.trim());
          render();
          [...document.querySelectorAll("details.section")].forEach((d) => {
            const key = d.querySelector("summary").textContent.trim();
            d.open = openKeys.includes(key);
          });
          // Restore focus on the input that triggered this
          if (evt === "input") {
            const sel = `[data-filter-section="${section}"][data-filter-field="${field}"]`;
            const next = document.querySelector(sel);
            if (next) {
              next.focus();
              const v = next.value; next.value = ""; next.value = v;
            }
          }
        });
      });

      // Logo (home)
      document.querySelector('[data-action="home"]')?.addEventListener("click", (e) => {
        e.preventDefault();
        S.view = "snapshots";
        S.currentDiff = null;
        render();
      });

      // Tabs
      document.querySelectorAll("[data-tab]").forEach((b) => {
        b.addEventListener("click", () => switchTab(b.dataset.tab));
      });

      // Catalog: facet radios
      document.querySelectorAll("[data-facet]").forEach((el) => {
        el.addEventListener("change", () => {
          const key = el.dataset.facet;
          const val = el.value || null;
          S.catalog.filters[key] = val;
          fetchCatalog(true);
        });
      });

      // Catalog: price min/max
      const priceMin = document.getElementById("price-min");
      const priceMax = document.getElementById("price-max");
      const onPriceChange = () => {
        const min = priceMin.value === "" ? null : parseFloat(priceMin.value);
        const max = priceMax.value === "" ? null : parseFloat(priceMax.value);
        S.catalog.filters.min_price = Number.isFinite(min) ? min : null;
        S.catalog.filters.max_price = Number.isFinite(max) ? max : null;
        fetchCatalog(true);
      };
      priceMin?.addEventListener("change", onPriceChange);
      priceMax?.addEventListener("change", onPriceChange);

      // Catalog: in_stock toggle
      const cbStock = document.getElementById("cb-instock");
      cbStock?.addEventListener("change", () => {
        S.catalog.filters.in_stock = cbStock.checked ? true : null;
        fetchCatalog(true);
      });

      // Catalog: reset
      document.getElementById("btn-reset-filters")?.addEventListener("click", resetCatalogFilters);

      // Catalog: facet "show all" toggle (brand, color, size)
      document.querySelectorAll("[data-toggle-facet]").forEach((el) => {
        el.addEventListener("click", () => {
          const key = el.dataset.toggleFacet;
          const stateKey = "showAll" + key.charAt(0).toUpperCase() + key.slice(1) + "s";
          S.catalog[stateKey] = !S.catalog[stateKey];
          render();
        });
      });

      // Catalog: search (debounced 300ms)
      const search = document.getElementById("catalog-search");
      if (search) {
        search.addEventListener("input", (e) => {
          S.catalog.filters.q = e.target.value;
          if (S.catalog.searchTimer) clearTimeout(S.catalog.searchTimer);
          S.catalog.searchTimer = setTimeout(() => fetchCatalog(true), 300);
        });
        // Restore caret to end if focus was here before re-render
        if (document.activeElement !== search && S.catalog._searchHasFocus) {
          search.focus();
          const v = search.value; search.value = ""; search.value = v;
        }
        search.addEventListener("focus", () => { S.catalog._searchHasFocus = true; });
        search.addEventListener("blur", () => { S.catalog._searchHasFocus = false; });
      }

      // Catalog: sort dropdown
      const sortSel = document.getElementById("catalog-sort");
      sortSel?.addEventListener("change", () => {
        const [s, d] = sortSel.value.split("-");
        S.catalog.sort = s;
        S.catalog.direction = d;
        fetchCatalog(true);
      });
    }

    // ─── Boot ────────────────────────────────────────────────────────
    async function init() {
      if (!CONFIG.supabaseKey || CONFIG.supabaseKey.includes("ANON_KEY_HERE")) {
        S.view = "login";
        S.error = "Clé Supabase non configurée — éditer index.html (supabaseKey).";
        render();
        return;
      }
      sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session?.user) {
          S.user = session.user;
          await fetchSnapshots();
          S.view = "snapshots";
        } else {
          S.view = "login";
        }
      } catch (e) {
        S.error = e.message;
        S.view = "login";
      }
      render();
    }

    init();
  </script>
</body>
</html>
